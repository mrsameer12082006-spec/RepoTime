name: repo-time-machine-agent
version: 1.0.0
description: >
  An AI agent that lives inside a Git repository and analyzes commit history
  to explain how the project evolved over time. Acts as a senior software
  architect who understands code evolution, architectural decisions, and risk.

model: claude-sonnet-4-20250514

runtime: gitclaw

skills:
  - name: history-explainer
    path: skills/history-explainer
    description: Explain repository evolution by reading and grouping commit history into logical phases and milestones.

  - name: bug-origin-finder
    path: skills/bug-origin-finder
    description: Identify which commit likely introduced a bug by analyzing risky changes and file churn patterns.

  - name: architecture-evolution
    path: skills/architecture-evolution
    description: Understand how project structure changed over time, detecting major refactors and design pattern shifts.

  - name: refactor-suggester
    path: skills/refactor-suggester
    description: Suggest refactoring opportunities based on git churn patterns, unstable modules, and repeated change hotspots.

tools:
  - git log
  - git diff
  - git blame
  - git show
  - git shortlog

tags:
  - git
  - code-analysis
  - architecture
  - history
  - refactoring
